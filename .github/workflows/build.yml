name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      build_recorder:
        description: 'Build recorder (C++)'
        type: boolean
        default: true
      build_analyzer:
        description: 'Build analyzer (Svelte)'
        type: boolean
        default: true
      upload_artifacts:
        description: 'Upload build artifacts'
        type: boolean
        default: true
      publish_release:
        description: 'Publish GitHub release with artifacts'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-recorder-windows:
    if: ${{ inputs.build_recorder }}
    runs-on: windows-latest
    name: Recorder - Windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ runner.temp }}/vcpkg'
          vcpkgGitCommitId: 'f6672d8e480ccdecddfad3fd1b838ba369ffe6cd'

      - name: Configure CMake (Ninja)
        run: |
          cmake --preset "vcpkg - Windows MSVC" -S recorder -B recorder/build
        env:
          VCPKG_ROOT: ${{ runner.temp }}/vcpkg

      - name: Build Recorder
        run: cmake --build recorder/build --config Release

      - name: Verify Binary
        run: |
          $binary = "recorder/build/Release/recorder-app.exe"
          if (Test-Path $binary) {
            $info = Get-Item $binary
            Write-Host "Binary found: $($info.FullName)"
            Write-Host "Size: $($info.Length) bytes"
          } else {
            Write-Error "Binary not found!"
            exit 1
          }

      - name: Bundle Required Runtime DLLs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $exe = "recorder/build/Release/recorder-app.exe"
          $binDir = "recorder/build/vcpkg_installed/x64-windows/bin"
          $dest = "recorder/build/Release"

          if (-not (Test-Path $binDir)) {
            Write-Host "No vcpkg bin directory - static build assumed"
            exit 0
          }

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstallPath) { throw "MSVC build tools not found" }
          $vcvars = Join-Path $vsInstallPath "VC\Auxiliary\Build\vcvars64.bat"

          cmd /c "`"$vcvars`" >nul && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              [System.Environment]::SetEnvironmentVariable($matches[1], $matches[2], 'Process')
            }
          }

          $dumpbinOutput = & dumpbin /dependents $exe 2>&1 | Out-String
          $importedDlls = [regex]::Matches($dumpbinOutput, '(?m)^\s+([\w-]+\.dll)\s*$') |
            ForEach-Object { $_.Groups[1].Value } |
            Sort-Object -Unique

          Write-Host "Imported DLLs (from PE import table):"
          $importedDlls | ForEach-Object { Write-Host "  $_" }

          Get-ChildItem -Path $dest -Filter "*.dll" -ErrorAction SilentlyContinue | Remove-Item -Force

          $processed = @{}
          $queue = New-Object System.Collections.Generic.Queue[string]
          $queue.Enqueue($exe)

          while ($queue.Count -gt 0) {
            $current = $queue.Dequeue()
            $key = [System.IO.Path]::GetFileName($current).ToLowerInvariant()
            if ($processed.ContainsKey($key)) { continue }
            $processed[$key] = $true

            Write-Host "Scanning: $([System.IO.Path]::GetFileName($current))"
            $output = & dumpbin /dependents $current 2>&1 | Out-String
            $imports = [regex]::Matches($output, '(?m)^\s+([\w-]+\.dll)\s*$') |
              ForEach-Object { $_.Groups[1].Value } |
              Sort-Object -Unique

            foreach ($dll in $imports) {
              $src = Join-Path $binDir $dll
              if (Test-Path $src) {
                $destDll = Join-Path $dest $dll
                if (-not (Test-Path $destDll)) {
                  Copy-Item $src $dest -Force
                  $queue.Enqueue($destDll)
                }
              }
            }
          }

          Write-Host ""
          Write-Host "Bundled DLLs (rest are system/VC++ Redist):"
          Get-ChildItem -Path $dest -Filter "*.dll" | Select-Object Name, Length

      - name: Upload Artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: recorder-windows
          path: |
            recorder/build/Release/*.exe
            recorder/build/Release/*.dll
          retention-days: 7

  build-recorder-linux:
    if: ${{ inputs.build_recorder }}
    runs-on: ubuntu-latest
    name: Recorder - Linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libevdev-dev libsystemd-dev pkg-config ninja-build autoconf autoconf-archive automake libtool libltdl-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ runner.temp }}/vcpkg'
          vcpkgGitCommitId: 'f6672d8e480ccdecddfad3fd1b838ba369ffe6cd'

      - name: Configure CMake (Ninja)
        run: |
          cmake --preset "vcpkg - Ninja" -S recorder -B recorder/build
        env:
          VCPKG_ROOT: ${{ runner.temp }}/vcpkg

      - name: Build Recorder
        run: cmake --build recorder/build --config Release

      - name: Verify Binary
        run: |
          binary="recorder/build/recorder-app"
          if [ -f "$binary" ]; then
            echo "Binary found: $binary"
            ls -la "$binary"
            file "$binary"
            echo ""
            echo "Dynamic library dependencies:"
            ldd "$binary" || true
          else
            echo "Binary not found!"
            exit 1
          fi

      - name: Upload Artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: recorder-linux
          path: recorder/build/recorder-app
          retention-days: 7

  build-analyzer:
    if: ${{ inputs.build_analyzer }}
    runs-on: ubuntu-latest
    name: Analyzer (Svelte)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: analyzer/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: analyzer

      - name: Build Analyzer
        run: pnpm run build
        working-directory: analyzer

      - name: Verify Build
        run: |
          if [ -d "analyzer/dist" ] && [ -f "analyzer/dist/index.html" ]; then
            echo "Build successful: analyzer/dist/"
            ls -la analyzer/dist/
          else
            echo "Build output not found!"
            exit 1
          fi

      - name: Upload Artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: analyzer
          path: analyzer/dist/
          retention-days: 7

  release:
    if: ${{ inputs.publish_release }}
    needs: [build-recorder-windows, build-recorder-linux, build-analyzer]
    runs-on: ubuntu-latest
    name: Publish Release
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in recorder-windows analyzer; do
            if [ -d "$dir" ]; then
              zip -r "${dir}.zip" "$dir"
            fi
          done
          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: |
            artifacts/recorder-windows.zip
            artifacts/recorder-linux/recorder-app
            artifacts/analyzer.zip
